<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schnitzeljagd</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="top-bar">
        <img id="top-logo" src="assets/icon/logo.png" alt="Logo">
        <div id="top-links">
            <button id="logout-btn">Logout</button>
            <a id="top-link" href="start.html">Startseite</a>
        </div>
    </div>
    <img id="wave-top" src="assets/img/wave-top.svg" alt="">


    <div id="admin-nachricht-display" style="display:none;"></div>


    <div id="spiel-bereich" class="bereich" style="display:none;">
        <h2 id="spiel-begruessung"></h2>
        <div id="spiel-frage"></div>
        <div id="spiel-tipp-container" style="display:none;">
            <button id="spiel-tipp-btn">Tipp anzeigen</button>
            <p id="spiel-tipp"></p>
        </div>
    </div>

    
    <img id="wave-bottom" src="assets/img/wave-bottom.svg" alt="">
    <div id="bottom-bar">
        <p id="version"></p>
    </div>
    <script type="module" src="js/game.js"></script>
</body>
</html>
