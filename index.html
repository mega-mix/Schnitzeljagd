<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ein Tag mit Lea und Paul</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div id="adminNachrichtDisplay" style="display:none;">

    </div>

    <div id="loginBereich">
        <h2>Gruppe anmelden</h2>
        <input type="text" id="gruppenName" placeholder="Gruppenname">
        <input type="password" id="passwort" placeholder="Passwort"><br><br>
        <button id="loginBtn">Starten</button>
        <button id="gotoCreateBtn">Gruppe erstellen</button>
        <p id="errorMsg" style="color:red;"></p>
    </div>

    <div id="createBereich" style="display:none;">
        <h2>Gruppe erstellen</h2>
        <input type="text" id="createGruppenName" placeholder="Gruppenname">
        <input type="password" id="createPasswort1" placeholder="Passwort">
        <input type="password" id="createPasswort2" placeholder="Passwort wiederholen"><br><br>
        <button id="createBtn">Erstellen</button>
        <button id="createAbortBtn">Abbrechen</button>
        <p id="createErrorMsg" style="color:red;"></p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
