<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ein Tag mit Lea und Paul</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="top-bar">
        <img id="top-logo" src="assets/icon/logo.png" alt="Logo">
        <div id="top-links">
            
        </div>
    </div>
    <img id="wave-top" src="assets/img/wave-top.svg" alt="">

    <div id="admin-nachricht-display" style="display:none;">

    </div>

    <div id="login-bereich">
        <h2>Anmelden</h2>
        <input type="text" id="login-name" placeholder="Spielername">
        <input type="password" id="login-passwort" placeholder="Passwort"><br><br>
        <button id="login-btn">Starten</button>
        <button id="goto-create-btn">Spieler erstellen</button>
        <p id="login-error-msg" style="color:red;"></p>
    </div>

    <div id="create-bereich" style="display:none;">
        <h2>Spieler erstellen</h2>
        <input type="text" id="create-name" placeholder="Spielername">
        <input type="password" id="create-passwort" placeholder="Passwort">
        <input type="password" id="create-passwort-wdh" placeholder="Passwort wiederholen">
        <p>Im Namen erlaubt: a-z, A-Z, 0-9, Umlaute, -, _</p>
        <p>Passwort muss mindestens 6 Zeichen beinhalten.</p><br><br>
        <button id="create-btn">Erstellen</button>
        <button id="create-abort-btn">Abbrechen</button>
        <p id="create-error-msg" style="color:red;"></p>
    </div>

    <img id="wave-bottom" src="assets/img/wave-bottom.svg" alt="">
    <div id="bottom-bar">
        <p id="version"></p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
