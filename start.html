<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schnitzeljagd</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="top-bar">
        <img id="top-logo" src="assets/icons/logo.png" alt="Logo">
        <div id="top-links">
            <button id="logout-btn">Logout</button>
            <a id="top-link" href="start.html">Startseite</a>
        </div>
    </div>
    <img id="wave-top" src="assets/img/wave-top.svg" alt="">


    <div id="admin-nachricht-display" style="display:none;"></div>

    
    <div id="news-nachricht-display" style="display:none;">
        <h2>NEWS</h2>
        <p id="news-nachricht"></p>
    </div>

    <div id="neue-episode-bereich" class="bereich" style="display:none;">
        <h2>Es gibt eine neue Episode</h2>
        <select id="neue-episoden-laden"></select>
        <button id="neue-episode-laden-btn">Laden</button>
        <button id="neue-episode-abort-btn">Abbrechen</button>
    </div>


    <div id="start-bereich" class="bereich" style="display: none;">
        <h2 id="start-begruessung">Hallo...</h2>
        <button id="start-spiel-btn">Spiel starten</button>
        <select id="start-episoden"></select>
        <button id="start-neue-episode-btn" style="display: none;">Neue Episode verfügbar</button>
        <button id="start-admin-btn" style="display: none;">Admin Bereich</button>
    </div>

    
    <img id="wave-bottom" src="assets/img/wave-bottom.svg" alt="">
    <div id="bottom-bar">
        <p id="version"></p>
    </div>
    <script type="module" src="js/start.js"></script>
</body>
</html>
